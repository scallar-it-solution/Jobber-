answers:
  - pattern: "(?i)phone|mobile"
    answer: "{phone}"
  - pattern: "(?i)email"
    answer: "{email}"
  - pattern: "(?i)notice period|when can you join|start date"
    answer: "I am available to join {notice_period}."
