name: autoapply-prod-test

services:
  postgres:
    image: postgres:16-alpine
    container_name: autoapply-prod-test-postgres
    environment:
      POSTGRES_USER: autoapply
      POSTGRES_PASSWORD: autoapply
      POSTGRES_DB: autoapply
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - autoapply_prod_test_postgres:/var/lib/postgresql/data
      - ../../data/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoapply -d autoapply"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: autoapply-prod-test-redis
    ports:
      - "127.0.0.1:56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  autoapply_prod_test_postgres:

